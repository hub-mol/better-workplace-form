<!doctype html>
<html lang="pl-PL">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex" />
        <title>Zapytanie · Dailyfruits | BetterWorkplace</title>

        <link rel="preconnect" crossorigin href="https://cdn.prod.website-files.com" />
        <link
            rel="stylesheet"
            href="https://cdn.prod.website-files.com/698dfabcdd705500e5451b80/css/better-workplace-corposite.webflow.shared.aa2dc6e3e.min.css"
            integrity="sha384-qi3G4+XfbaCa+GD7aLmLMbijRrB6a4CBj86jq034Dh0e2S51RO/unlEgtjsw66Xp"
            crossorigin="anonymous"
        />

        <style>
            /* ── base form chrome (same as embed.html) ───────────────────── */
            .form-stepper {
                display: flex;
                gap: 0.375rem;
                margin-bottom: 2rem;
            }
            .form-stepper_pill {
                flex: 1;
                height: 0.375rem;
                border-radius: 1rem;
                background: var(--better-workplace---neutral--neutral-200, #ece9e9);
                transition: background 0.3s;
            }
            .form-stepper_pill.is-active,
            .form-stepper_pill.is-done {
                background: var(--better-workplace---strong--strong-100-primary, #1f0b09);
            }
            .form-step {
                min-height: 25rem;
            }
            .form-nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .form-nav_left,
            .form-nav_right {
                display: flex;
                align-items: center;
            }
            .button.is-loading {
                opacity: 0.6;
                pointer-events: none;
            }
            .form-helper {
                display: none;
            }
            .form-loader {
                width: 100%;
                height: 0.375rem;
                border-radius: 1rem;
                background: var(--better-workplace---neutral--neutral-200, #ece9e9);
                overflow: hidden;
            }
            .form-loader_fill {
                height: 100%;
                border-radius: 1rem;
                background: var(--better-workplace---strong--strong-100-primary, #1f0b09);
                transition: width 0.4s ease;
            }

            /* ── Dailyfruits theme — scoped to the #app mount ──── */
            /* tło formularza krem — .card to faktyczna powierzchnia formularza
               (Webflow maluje ją na biało), #app jako fallback */
            #app,
            #app .card {
                background-color: #fff9e0;
            }
            /* etykiety, nagłówki, tekst zgody — zielony */
            #app .form_field-label,
            #app .heading-style-h5,
            #app legend,
            #app .form_checkbox-label,
            #app p {
                color: #1b5e3a;
            }
            /* inputy / selecty / textarea — białe tło */
            #app .form_input,
            #app .w-input,
            #app .w-select {
                background-color: #ffffff;
                color: #1b5e3a;
            }
            /* etykieta nad inputem, bez tła — domyślnie jest absolutna i nachodzi
               na obramowanie inputu; wracamy do normalnego flow */
            #app .form_field-wrapper {
                padding-top: 0;
            }
            #app .form_field-label {
                position: static;
                width: auto;
                margin: 0 0 0.375rem;
                background: transparent;
            }
            /* „Pobierz dane" wyrównany do dołu komórki (obok inputu NIP) */
            #app .form_nip {
                display: flex;
                align-items: flex-end;
                height: 100%;
            }
            /* każdy przycisk w apce — kolor głównego przycisku */
            #app .better-workplace--button {
                background-color: #8dc63f;
                border-radius: 999px;
            }
            #app .better-workplace--button_text,
            #app .better-workplace--button_text span,
            #app .better-workplace--icon-svg {
                color: #1b5e3a;
            }
            /* callout NIP (wariant „info") — w kolorze brand (zielony) */
            #app .better-workplace--info-callout[data-wf--better-workplace--system-box--variant="info"] {
                background-color: rgba(141, 198, 63, 0.18);
                border-left-color: #8dc63f;
                color: #1b5e3a;
            }
            /* fallback dla prostego przycisku (ARROW_BTN = false) */
            #app button.button {
                background-color: #8dc63f;
                color: #1b5e3a;
                border-radius: 999px;
            }
        </style>
    </head>
    <body>
        <!-- SVG sprite — ikony używane przez Webflow CSS -->
        <svg xmlns="http://www.w3.org/2000/svg" style="display: none" aria-hidden="true">
            <symbol id="error" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2" fill="none" />
                <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M16 10v8M16 22h.5" />
            </symbol>
            <symbol id="arrow-right" viewBox="0 0 32 32">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 16h20M18 8l8 8-8 8" />
            </symbol>
            <symbol id="arrow-left" viewBox="0 0 32 32">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M26 16H6M14 8L6 16l8 8" />
            </symbol>
            <symbol id="info" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2" fill="none" />
                <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M16 22v-8M16 10h.5" />
            </symbol>
            <symbol id="mail" viewBox="0 0 32 32">
                <rect x="4" y="7" width="24" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none" />
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 9l11 8 11-8" />
            </symbol>
        </svg>

        <div
            id="app"
            data-form-label-above
            data-form-company-name="Dailyfruits Sp. z o.o."
            data-form-marketing
            data-form-brand="Dailyfruits"
        ></div>

        <script type="module" src="../form.js"></script>
    </body>
</html>
